<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Peril Risk Atlas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #07090f;
    --panel: #0d1018;
    --border: #1a2030;
    --text: #c0cce0;
    --muted: #4a5470;
    --accent: #e0ecff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 21px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  header span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 225px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--panel);
    overflow-y: auto;
    padding: 12px 10px;
  }

  .sidebar-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 9px;
    padding-bottom: 7px;
    border-bottom: 1px solid var(--border);
  }

  .all-toggle {
    width: 100%;
    padding: 7px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 9px;
    transition: all 0.15s;
    text-align: center;
  }
  .all-toggle:hover { background: rgba(255,255,255,0.08); color: var(--text); }

  .peril-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 9px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    margin-bottom: 4px;
    transition: all 0.15s;
    text-align: left;
  }

  .peril-btn.active {
    border-color: rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.025);
  }

  .peril-swatch {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .peril-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .peril-check {
    width: 13px; height: 13px;
    border-radius: 2px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 8px;
    flex-shrink: 0;
    color: #000;
  }

  .peril-btn.active .peril-check {
    background: currentColor;
    border-color: currentColor;
  }

  .risk-scale {
    margin-top: 14px;
    padding: 11px;
    background: rgba(255,255,255,0.02);
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .risk-scale-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .risk-bar {
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, rgba(255,255,255,0.05), rgba(255,255,255,0.85));
    margin-bottom: 5px;
  }

  .risk-labels {
    display: flex;
    justify-content: space-between;
    font-size: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #060810;
  }

  #map-svg { width: 100%; height: 100%; }

  .tooltip {
    position: absolute;
    background: rgba(7,9,15,0.96);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    pointer-events: none;
    display: none;
    z-index: 200;
    min-width: 180px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
  }

  .tooltip-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 7px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 5px;
  }

  .tooltip-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 3px;
    align-items: center;
  }

  .tooltip-peril {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--muted);
    font-size: 10.5px;
  }

  .tooltip-dot { width: 6px; height: 6px; border-radius: 50%; }

  .tooltip-val {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    white-space: nowrap;
  }

  .legend-panel {
    position: absolute;
    bottom: 16px;
    right: 16px;
    background: rgba(7,9,15,0.93);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    backdrop-filter: blur(12px);
    z-index: 100;
    min-width: 165px;
    max-height: 55vh;
    overflow-y: auto;
  }

  .legend-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 10.5px;
    color: var(--text);
  }

  .legend-grad {
    width: 26px; height: 6px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .map-credit {
    position: absolute;
    bottom: 5px;
    left: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 7.5px;
    color: var(--muted);
    letter-spacing: 0.8px;
    opacity: 0.5;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <h1>US Peril Risk Atlas</h1>
  <span>Annual Occurrence Probability — Hover to explore</span>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">Peril Layers</div>
    <button class="all-toggle" onclick="toggleAll()">Toggle All</button>
    <div id="peril-controls"></div>
    <div class="risk-scale">

      <div class="risk-bar"></div>
      <div class="risk-labels"><span>Low</span><span>Med</span><span>High</span><span>Extreme</span></div>
    </div>
  </div>

    <div class="tooltip" id="tooltip"></div>
    <div class="legend-panel" id="legend-panel"></div>

// ── Build sidebar ──
const activePerils = new Set(PERILS.map(p => p.id));
const controlsEl = document.getElementById('peril-controls');

PERILS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'peril-btn active';
  btn.id = `btn-${p.id}`;
  btn.style.color = p.color;
  btn.innerHTML = `
    <div class="peril-swatch" style="background:${p.color};box-shadow:0 0 5px ${p.color}55"></div>
    <span class="peril-label">${p.name}</span>
    <div class="peril-check">✓</div>`;
  btn.addEventListener('click', () => togglePeril(p.id));
  controlsEl.appendChild(btn);
});

function togglePeril(id) {
  activePerils.has(id) ? activePerils.delete(id) : activePerils.add(id);
  document.getElementById(`btn-${id}`).classList.toggle('active', activePerils.has(id));
  drawHeat();
  updateLegend();
}

function toggleAll() {
  const allOn = activePerils.size === PERILS.length;
  PERILS.forEach(p => {
    allOn ? activePerils.delete(p.id) : activePerils.add(p.id);
    document.getElementById(`btn-${p.id}`).classList.toggle('active', !allOn);
  });
  drawHeat();
  updateLegend();
}

// ── Map setup ──
const svg = d3.select('#map-svg');
const wrap = document.getElementById('mapWrap');
let W, H, projection, geoPath, heatLayer, stateLayer, borderLayer;

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function drawHeat() {
  if (!heatLayer || !projection) return;
  heatLayer.selectAll('*').remove();

  // Clean old defs
  svg.select('defs').selectAll('radialGradient').remove();
  let defs = svg.select('defs');
  if (defs.empty()) defs = svg.append('defs');

  let gid = 0;
  PERILS.forEach(peril => {
    if (!activePerils.has(peril.id)) return;
    const [r,g,b] = hexToRgb(peril.color);

    peril.zones.forEach(zone => {
      const pt = projection([zone.lon, zone.lat]);
      if (!pt) return;

      const id = `hg${gid++}`;
      const inten = zone.intensity;

      const grad = defs.append('radialGradient')
        .attr('id', id).attr('cx','50%').attr('cy','50%')
        .attr('r','50%').attr('fx','50%').attr('fy','50%');

      grad.append('stop').attr('offset','0%')
        .attr('stop-color',`rgb(${r},${g},${b})`).attr('stop-opacity', Math.min(inten*0.80, 0.80));
      grad.append('stop').attr('offset','35%')
        .attr('stop-color',`rgb(${r},${g},${b})`).attr('stop-opacity', Math.min(inten*0.48, 0.52));
      grad.append('stop').attr('offset','70%')
        .attr('stop-color',`rgb(${r},${g},${b})`).attr('stop-opacity', Math.min(inten*0.15, 0.18));
      grad.append('stop').attr('offset','100%')
        .attr('stop-color',`rgb(${r},${g},${b})`).attr('stop-opacity', 0);

      heatLayer.append('ellipse')
        .attr('cx', pt[0]).attr('cy', pt[1])
        .attr('rx', zone.rx).attr('ry', zone.ry)
        .attr('fill', `url(#${id})`)
        .style('mix-blend-mode','screen');
    });
  });
}

function initMap() {
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  svg.attr('width', W).attr('height', H);
  svg.selectAll('*').remove();

  projection = d3.geoAlbersUsa()
    .scale(Math.min(W * 1.25, H * 2.1))
    .translate([W * 0.5, H * 0.5]);

  geoPath = d3.geoPath().projection(projection);

  // Background
  svg.append('rect').attr('width', W).attr('height', H).attr('fill','#060810');

  // Grid
  const gridG = svg.append('g');
  for (let x=0; x<W; x+=50) gridG.append('line').attr('x1',x).attr('y1',0).attr('x2',x).attr('y2',H).attr('stroke','rgba(255,255,255,0.018)').attr('stroke-width',0.5);
  for (let y=0; y<H; y+=50) gridG.append('line').attr('x1',0).attr('y1',y).attr('x2',W).attr('y2',y).attr('stroke','rgba(255,255,255,0.018)').attr('stroke-width',0.5);

  svg.append('defs');

  // Heat layer (drawn first, behind states)
  heatLayer = svg.append('g').attr('class','heat-layer');

  // State fills layer
  stateLayer = svg.append('g').attr('class','state-layer');

  // Border layer (on top of heat)
  borderLayer = svg.append('g').attr('class','border-layer');

  // Fetch real US map data
  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
    const states    = topojson.feature(us, us.objects.states);
    const stateMesh = topojson.mesh(us, us.objects.states, (a,b) => a !== b); // interior borders
    const nationMesh= topojson.mesh(us, us.objects.states, (a,b) => a === b); // exterior border

    // State fills — semi-transparent dark fill so heat shows through
    stateLayer.selectAll('path')
      .data(states.features)
      .join('path')
      .attr('d', geoPath)
      .attr('fill','rgba(10,14,24,0.55)')
      .attr('stroke','none');

    // Draw heat BEFORE borders visually; heat was appended before stateLayer so it's underneath
    drawHeat();

    // Interior state borders
    borderLayer.append('path')
      .datum(stateMesh)
      .attr('fill','none')
      .attr('stroke','rgba(140,175,235,0.50)')
      .attr('stroke-width', 0.65)
      .attr('d', geoPath);

    // Exterior nation border
    borderLayer.append('path')
      .datum(nationMesh)
      .attr('fill','none')
      .attr('stroke','rgba(190,220,255,0.90)')
      .attr('stroke-width', 2.0)
      .attr('stroke-linejoin','round')
      .attr('d', geoPath);

    // City dots
    const cities = [
      {name:'New York',    lat:40.71, lon:-74.01},
      {name:'Los Angeles', lat:34.05, lon:-118.24},
      {name:'Chicago',     lat:41.88, lon:-87.63},
      {name:'Houston',     lat:29.76, lon:-95.37},
      {name:'Miami',       lat:25.77, lon:-80.19},
      {name:'Seattle',     lat:47.61, lon:-122.33},
      {name:'New Orleans', lat:29.95, lon:-90.07},
      {name:'Dallas',      lat:32.78, lon:-96.80},
      {name:'Denver',      lat:39.74, lon:-104.98},
      {name:'Atlanta',     lat:33.75, lon:-84.39},
      {name:'Washington',  lat:38.91, lon:-77.04},
      {name:'Phoenix',     lat:33.45, lon:-112.07},
      {name:'San Francisco',lat:37.77,lon:-122.42},
      {name:'Minneapolis', lat:44.98, lon:-93.27},
    ];

    const cityG = svg.append('g');
    cities.forEach(c => {
      const pt = projection([c.lon, c.lat]);
      if (!pt) return;
      cityG.append('circle').attr('cx',pt[0]).attr('cy',pt[1]).attr('r',2.2)
        .attr('fill','rgba(255,255,255,0.75)').attr('stroke','rgba(0,0,0,0.4)').attr('stroke-width',0.6);
      cityG.append('text').attr('x',pt[0]+5).attr('y',pt[1]-3)
        .attr('fill','rgba(255,255,255,0.38)').attr('font-size','8')
        .attr('font-family','DM Mono, monospace').text(c.name);
    });

    // Hover capture layer
    svg.append('g').selectAll('path')
      .data(states.features)
      .join('path')
      .attr('d', geoPath)
      .attr('fill','transparent')
      .attr('stroke','none')
      .style('cursor','crosshair')
      .on('mousemove', onMouseMove)
      .on('mouseleave', () => { document.getElementById('tooltip').style.display='none'; });

  }).catch(err => {
    console.error('TopoJSON load error:', err);
    svg.append('text').attr('x',W/2).attr('y',H/2)
      .attr('fill','#ff6644').attr('text-anchor','middle').attr('font-size','14')
      .text('Failed to load map data. Check network connection.');
  });
}

// ── Tooltip ──
function getRiskLabel(v) {
  if (v > 0.80) return 'Extreme';
  if (v > 0.60) return 'High';
  if (v > 0.35) return 'Moderate';
  return 'Low';
}

function onMouseMove(event) {
  const [mx, my] = d3.pointer(event, wrap);
  const pt = projection.invert([mx, my]);
  if (!pt) return;
  const [lon, lat] = pt;

  const results = [];
  PERILS.forEach(peril => {
    if (!activePerils.has(peril.id)) return;
    let maxI = 0;
    peril.zones.forEach(zone => {
      const zpt = projection([zone.lon, zone.lat]);
      if (!zpt) return;
      const ex = (mx - zpt[0]) / zone.rx;
      const ey = (my - zpt[1]) / zone.ry;
      const d = Math.sqrt(ex*ex + ey*ey);
      if (d < 1.0) {
        const local = zone.intensity * Math.pow(Math.max(0, 1-d), 1.3);
        if (local > maxI) maxI = local;
      }
    });
    if (maxI > 0.04) results.push({peril, intensity: maxI});
  });

  results.sort((a,b) => b.intensity - a.intensity);
  const top = results.slice(0, 6);
  const tooltip = document.getElementById('tooltip');

  if (!top.length) { tooltip.style.display='none'; return; }

  let html = `<div class="tooltip-title">Annual Risk Profile</div>`;
  top.forEach(({peril, intensity}) => {
    const pct = Math.round(intensity * 100);
    html += `<div class="tooltip-row">
      <div class="tooltip-peril"><div class="tooltip-dot" style="background:${peril.color}"></div><span>${peril.name}</span></div>
      <span class="tooltip-val" style="color:${peril.color}">${getRiskLabel(intensity)} · ${pct}%</span>
    </div>`;
  });
  tooltip.innerHTML = html;
  tooltip.style.display = 'block';

  const tw = tooltip.offsetWidth || 195, th = tooltip.offsetHeight || 190;
  let tx = mx + 14, ty = my + 8;
  if (tx + tw > wrap.clientWidth - 8) tx = mx - tw - 14;
  if (ty + th > wrap.clientHeight - 8) ty = my - th - 8;
  tooltip.style.left = tx + 'px';
  tooltip.style.top  = ty + 'px';
}

// ── Legend ──
function updateLegend() {
  const el = document.getElementById('legend-panel');
  const active = PERILS.filter(p => activePerils.has(p.id));
  if (!active.length) { el.style.display='none'; return; }
  el.style.display='block';
  let html = `<div class="legend-title">Active Layers</div>`;
  active.forEach(p => {
    html += `<div class="legend-item"><div class="legend-grad" style="background:linear-gradient(to right,transparent,${p.color})"></div><span>${p.name}</span></div>`;
  });
  el.innerHTML = html;
}
updateLegend();

window.addEventListener('resize', () => { initMap(); updateLegend(); });
initMap();
</script>

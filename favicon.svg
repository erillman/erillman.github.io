<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#c4704f"/>

  <!-- Tiny bar chart (data guy) -->
  <rect x="10" y="38" width="6" height="12" rx="1.5" fill="rgba(255,255,255,0.5)"/>
  <rect x="18" y="32" width="6" height="18" rx="1.5" fill="rgba(255,255,255,0.7)"/>
  <rect x="26" y="26" width="6" height="24" rx="1.5" fill="white"/>

  <!-- Tiny upward trend line (always going up) -->
  <polyline points="36,44 42,36 48,30 54,22" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="54" cy="22" r="2.5" fill="white"/>

  <!-- Music note (musician) -->
  <text x="8" y="22" font-size="13" fill="rgba(255,255,255,0.75)" font-family="Arial">♪</text>

  <!-- Wave / ocean hint (diver) -->
  <path d="M10 54 Q16 50 22 54 Q28 58 34 54 Q40 50 46 54 Q52 58 56 54" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
</svg>
